name: Trnava Data Collector

on:
  schedule:
    - cron: '0 * * * *' # Spustí sa každú celú hodinu
  workflow_dispatch: # Umožní ti spustiť to manuálne tlačidlom

permissions:
  contents: write # Povolí GitHubu zapisovať súbory (Excel a HTML) späť do tvojho Code

jobs:
  run-collector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitára
        uses: actions/checkout@v3

      - name: Nastavenie Pythonu
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Inštalácia knižníc
        run: |
          pip install requests pandas openpyxl pytz

      - name: Spustenie zberu dát
        env:
          TOMTOM_KEY: ${{ secrets.TOMTOM_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
        run: python pocasie.py

      - name: Uloženie zmien (Excel a HTML)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data_trnava_komplet.xlsx index.html
          git commit -m "Aktualizácia dát a webu: $(date)" || echo "Žiadne zmeny"
          git push
