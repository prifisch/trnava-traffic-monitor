name: Trnava Data Collection

permissions:
  contents: write

on:
  schedule:
    # Spúšťa sa každých 10 minút
    - cron: '*/30 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch: # Umožní ti spustiť zber manuálne tlačidlom v GitHub Actions

jobs:
  build: # TOTO JE TO CHÝBAJÚCE SLOVO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitára
        uses: actions/checkout@v4

      - name: Nastavenie Pythonu
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Inštalácia knižníc
        run: |
          pip install requests pandas openpyxl pytz

      - name: Spusti zber dát (Python skript)
        env:
          TOMTOM_KEY: ${{ secrets.TOMTOM_KEY }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: python pocasie.py

      - name: Uloženie zmien (Push do repozitára)
        run: |
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add data_trnava_komplet.xlsx index.html
                
            # Vytvoríme commit
            git commit -m "Aktualizácia dát: $(date)" || echo "No changes"
                
            # Kľúčová zmena: Stiahneme zmeny a v prípade konfliktu v Exceli 
            # povieme, že naša nová verzia (-X theirs) má prednosť.
            git fetch origin main
            git rebase -X theirs origin/main
                
            git push origin main          
